<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a6bb5">
<title>Breathe</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #1a6bb5;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
  }
  body {
    display: flex;
    flex-direction: column;
  }
</style>
</head>
<body>
<div id="breathe-app">
<style>
  #breathe-app {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    background: #1a6bb5 !important;
    color: #fff !important;
    width: 100%;
    flex: 1;
    min-height: 100vh;
    min-height: 100dvh;
    padding: calc(env(safe-area-inset-top) + 16px) calc(env(safe-area-inset-right) + 24px) calc(env(safe-area-inset-bottom) + 20px) calc(env(safe-area-inset-left) + 24px);
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    box-sizing: border-box;
  }

  #breathe-app * {
    box-sizing: border-box;
    font-family: inherit !important;
    color: inherit !important;
  }

  #breathe-app h1 {
    font-size: 2rem !important;
    font-weight: 700 !important;
    margin: 0 0 20px !important;
    padding: 0 !important;
    align-self: flex-start;
    color: #fff !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    line-height: 1.2 !important;
  }

  /* ── Orb ── */
  #ba-orb-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 14px;
    gap: 6px;
  }

  #ba-orb-stage {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #ba-orb-glow {
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%) !important;
    filter: blur(16px);
    opacity: 0.28;
    transform: scale(1);
    transition: transform 0.25s ease-out, opacity 0.25s ease-out;
    pointer-events: none;
  }

  #ba-orb {
    position: relative;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 36%, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.16) 72%) !important;
    border: 2px solid rgba(255,255,255,0.45) !important;
    box-shadow: 0 0 34px rgba(255,255,255,0.18),
                inset 0 8px 26px rgba(255,255,255,0.22),
                inset 0 -10px 30px rgba(255,255,255,0.10) !important;
    transition: transform 0.12s ease-out, box-shadow 0.6s ease;
    overflow: hidden;
    will-change: transform;
  }

  #ba-orb::before {
    content: '';
    position: absolute;
    inset: -30%;
    background: radial-gradient(circle at 32% 30%, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0) 46%);
    animation: ba-swirl 18s linear infinite;
    pointer-events: none;
  }

  @keyframes ba-swirl {
    to { transform: rotate(360deg); }
  }

  /* Resting breath when idle */
  #ba-orb-stage.ba-idle #ba-orb {
    animation: ba-idle-breathe 7s ease-in-out infinite;
  }
  #ba-orb-stage.ba-idle #ba-orb-glow {
    animation: ba-idle-glow 7s ease-in-out infinite;
  }
  @keyframes ba-idle-breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.07); }
  }
  @keyframes ba-idle-glow {
    0%, 100% { opacity: 0.20; transform: scale(1); }
    50%      { opacity: 0.40; transform: scale(1.16); }
  }

  @media (prefers-reduced-motion: reduce) {
    #ba-orb::before,
    #ba-orb-stage.ba-idle #ba-orb,
    #ba-orb-stage.ba-idle #ba-orb-glow { animation: none; }
  }

  #ba-phase-label {
    font-size: 1.4rem !important;
    font-weight: 600 !important;
    letter-spacing: 0.04em;
    min-height: 1.8rem;
    color: #fff !important;
  }

  #ba-timer-label {
    font-size: 2.5rem !important;
    font-weight: 300 !important;
    letter-spacing: -0.02em;
    min-height: 3rem;
    font-variant-numeric: tabular-nums;
    color: #fff !important;
  }

  #ba-cycle-label {
    font-size: 0.95rem !important;
    opacity: 0.75;
    min-height: 1.2rem;
    color: #fff !important;
  }

  /* ── Controls ── */
  #ba-controls {
    width: 100%;
    max-width: 400px;
    background: rgba(255,255,255,0.12) !important;
    border-radius: 20px !important;
    padding: 18px 20px !important;
    display: flex !important;
    flex-direction: column !important;
    gap: 14px;
    margin-bottom: 20px;
    border: none !important;
  }

  .ba-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ba-row-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ba-row-header label {
    font-size: 0.95rem !important;
    font-weight: 500 !important;
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    color: #fff !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .ba-val {
    font-size: 0.9rem !important;
    font-weight: 600 !important;
    background: rgba(255,255,255,0.2) !important;
    padding: 2px 10px !important;
    border-radius: 20px !important;
    color: #fff !important;
  }

  .ba-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2) !important;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem !important;
    color: #fff !important;
    flex-shrink: 0;
  }

  .ba-divider {
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 2px 0;
    border: none;
  }

  #breathe-app input[type=range] {
    -webkit-appearance: none !important;
    appearance: none !important;
    width: 100% !important;
    height: 6px !important;
    border-radius: 3px !important;
    background: rgba(255,255,255,0.3) !important;
    outline: none !important;
    cursor: pointer !important;
    border: none !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
  }

  #breathe-app input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none !important;
    width: 20px !important;
    height: 20px !important;
    border-radius: 50% !important;
    background: #fff !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25) !important;
    border: none !important;
    cursor: pointer !important;
  }

  #ba-length-display {
    font-size: 0.85rem !important;
    opacity: 0.75;
    text-align: center;
    color: #fff !important;
  }

  /* ── Buttons ── */
  #ba-btn-row {
    display: flex !important;
    gap: 14px !important;
    width: 100%;
    max-width: 400px;
  }

  #breathe-app button {
    flex: 1 !important;
    padding: 14px !important;
    border: none !important;
    border-radius: 14px !important;
    font-size: 1rem !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    transition: opacity 0.15s !important;
    outline: none !important;
    box-shadow: none !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    line-height: 1 !important;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
  }

  #breathe-app button:active { opacity: 0.75 !important; }

  #ba-btn-start {
    background: #fff !important;
    color: #1a6bb5 !important;
  }

  #ba-btn-reset {
    background: rgba(255,255,255,0.2) !important;
    color: #fff !important;
  }
</style>

<h1>Breathe</h1>

<div id="ba-orb-wrap">
  <div id="ba-orb-stage">
    <div id="ba-orb-glow"></div>
    <div id="ba-orb"></div>
  </div>
  <div id="ba-phase-label">—</div>
  <div id="ba-timer-label"></div>
  <div id="ba-cycle-label"></div>
</div>

<div id="ba-controls">
  <div class="ba-row">
    <div class="ba-row-header">
      <label><span class="ba-icon">↗</span> Inhale</label>
      <span class="ba-val" id="ba-val-inhale">5.5s</span>
    </div>
    <input type="range" id="ba-sl-inhale" min="1" max="30" step="0.5" value="5.5">
  </div>

  <div class="ba-row">
    <div class="ba-row-header">
      <label><span class="ba-icon">→</span> Hold (after inhale)</label>
      <span class="ba-val" id="ba-val-hold1">0s</span>
    </div>
    <input type="range" id="ba-sl-hold1" min="0" max="20" value="0">
  </div>

  <div class="ba-divider"></div>

  <div class="ba-row">
    <div class="ba-row-header">
      <label><span class="ba-icon">↘</span> Exhale</label>
      <span class="ba-val" id="ba-val-exhale">5.5s</span>
    </div>
    <input type="range" id="ba-sl-exhale" min="1" max="30" step="0.5" value="5.5">
  </div>

  <div class="ba-row">
    <div class="ba-row-header">
      <label><span class="ba-icon">→</span> Hold (after exhale)</label>
      <span class="ba-val" id="ba-val-hold2">0s</span>
    </div>
    <input type="range" id="ba-sl-hold2" min="0" max="20" value="0">
  </div>

  <div class="ba-divider"></div>

  <div class="ba-row">
    <div class="ba-row-header">
      <label><span class="ba-icon">↺</span> Repeat</label>
      <span class="ba-val" id="ba-val-repeat">100×</span>
    </div>
    <input type="range" id="ba-sl-repeat" min="1" max="200" value="100">
  </div>

  <div id="ba-length-display">Exercise length: —</div>
</div>

<div id="ba-btn-row">
  <button id="ba-btn-start" onclick="baToggleStart()">Start</button>
  <button id="ba-btn-reset" onclick="baReset()">Reset</button>
</div>

<script>
(function() {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let actx = null;

  function ensureAudio() {
    if (!actx) actx = new AudioCtx();
    if (actx.state === 'suspended') actx.resume();
  }

  function chime(freq, dur = 1.2) {
    ensureAudio();
    const t = actx.currentTime;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.start(t); osc.stop(t + dur);
  }

  const G6 = 1567.98, C6 = 1046.50;

  const sl = {
    inhale: document.getElementById('ba-sl-inhale'),
    hold1:  document.getElementById('ba-sl-hold1'),
    exhale: document.getElementById('ba-sl-exhale'),
    hold2:  document.getElementById('ba-sl-hold2'),
    repeat: document.getElementById('ba-sl-repeat'),
  };

  function getV() {
    return {
      inhale: +sl.inhale.value, hold1: +sl.hold1.value,
      exhale: +sl.exhale.value, hold2: +sl.hold2.value,
      repeat: +sl.repeat.value,
    };
  }

  function fmtTime(s) {
    const m = Math.floor(s / 60), r = s % 60;
    return m > 0 ? `${m} min, ${r} sec` : `${r} sec`;
  }

  function updateLabels() {
    const v = getV();
    document.getElementById('ba-val-inhale').textContent = v.inhale + 's';
    document.getElementById('ba-val-hold1').textContent  = v.hold1 + 's';
    document.getElementById('ba-val-exhale').textContent = v.exhale + 's';
    document.getElementById('ba-val-hold2').textContent  = v.hold2 + 's';
    document.getElementById('ba-val-repeat').textContent = v.repeat + '×';
    const total = (v.inhale + v.hold1 + v.exhale + v.hold2) * v.repeat;
    document.getElementById('ba-length-display').textContent = 'Exercise length: ' + fmtTime(total);
  }

  Object.values(sl).forEach(s => s.addEventListener('input', updateLabels));
  updateLabels();

  let running = false, rafId = null, startAt = null;
  let phaseIdx = 0, cycle = 0, phases = [];
  let wakeLock = null;

  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
  }

  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  }

  document.addEventListener('visibilitychange', () => {
    if (running && document.visibilityState === 'visible') acquireWakeLock();
  });

  function buildPhases(v) {
    const list = [];
    for (let i = 0; i < v.repeat; i++) {
      list.push({ label: 'Inhale',  dur: v.inhale, scale: 1.55, freq: G6 });
      if (v.hold1 > 0) list.push({ label: 'Hold', dur: v.hold1, scale: 1.55 });
      list.push({ label: 'Exhale',  dur: v.exhale, scale: 0.7,  freq: C6 });
      if (v.hold2 > 0) list.push({ label: 'Hold', dur: v.hold2, scale: 0.7  });
    }
    return list;
  }

  const orb   = document.getElementById('ba-orb');
  const stage = document.getElementById('ba-orb-stage');
  const glow  = document.getElementById('ba-orb-glow');
  const phLbl = document.getElementById('ba-phase-label');
  const tmLbl = document.getElementById('ba-timer-label');
  const cyLbl = document.getElementById('ba-cycle-label');
  const btnS  = document.getElementById('ba-btn-start');

  const MIN_SCALE = 0.7, MAX_SCALE = 1.55;

  // Cosine ease-in-out: slow at the turn, smooth through the middle.
  function ease(t) { return 0.5 - 0.5 * Math.cos(Math.PI * t); }

  function setGlow(scale) {
    const t = (scale - MIN_SCALE) / (MAX_SCALE - MIN_SCALE);
    glow.style.opacity = (0.18 + t * 0.36).toFixed(3);
    glow.style.transform = `scale(${(1 + t * 0.22).toFixed(3)})`;
  }

  function goIdle() {
    stage.classList.add('ba-idle');
    orb.style.transform = '';
    glow.style.transform = '';
    glow.style.opacity = '';
  }

  function setPhase(p) {
    let s = p.scale;
    if (p.label === 'Inhale') s = MIN_SCALE;
    else if (p.label === 'Exhale') s = MAX_SCALE;
    orb.style.transform = `scale(${s})`;
    setGlow(s);
    phLbl.textContent = p.label;
    if (p.freq) chime(p.freq);
  }

  function stepsPerCycle(v) {
    return 2 + (v.hold1 > 0 ? 1 : 0) + (v.hold2 > 0 ? 1 : 0);
  }

  function tick() {
    if (!running) return;
    const phase = phases[phaseIdx];
    if (!phase) { finish(); return; }

    const elapsed = (Date.now() - startAt) / 1000;
    const remain = Math.max(0, phase.dur - elapsed);
    tmLbl.textContent = remain.toFixed(1) + 's';

    const prog = ease(Math.min(elapsed / phase.dur, 1));
    let scale = null;
    if (phase.label === 'Inhale')      scale = MIN_SCALE + prog * (MAX_SCALE - MIN_SCALE);
    else if (phase.label === 'Exhale') scale = MAX_SCALE - prog * (MAX_SCALE - MIN_SCALE);
    if (scale !== null) { orb.style.transform = `scale(${scale})`; setGlow(scale); }

    if (elapsed >= phase.dur) {
      phaseIdx++;
      if (phaseIdx >= phases.length) { finish(); return; }
      const v = getV();
      cycle = Math.floor(phaseIdx / stepsPerCycle(v)) + 1;
      cyLbl.textContent = `Cycle ${Math.min(cycle, v.repeat)} of ${v.repeat}`;
      setPhase(phases[phaseIdx]);
      startAt = Date.now();
    }
    rafId = requestAnimationFrame(tick);
  }

  function start() {
    const v = getV();
    phases = buildPhases(v); phaseIdx = 0; cycle = 1; running = true;
    stage.classList.remove('ba-idle');
    btnS.textContent = 'Pause';
    setSliders(false);
    cyLbl.textContent = `Cycle 1 of ${v.repeat}`;
    setPhase(phases[0]);
    startAt = Date.now();
    acquireWakeLock();
    rafId = requestAnimationFrame(tick);
  }

  function pause() {
    running = false; cancelAnimationFrame(rafId);
    btnS.textContent = 'Resume';
    releaseWakeLock();
  }

  function resume() {
    running = true; btnS.textContent = 'Pause';
    const remaining = parseFloat(tmLbl.textContent);
    startAt = Date.now() - (phases[phaseIdx].dur - remaining) * 1000;
    acquireWakeLock();
    rafId = requestAnimationFrame(tick);
  }

  function finish() {
    running = false; cancelAnimationFrame(rafId);
    releaseWakeLock();
    goIdle();
    phLbl.textContent = 'Done'; tmLbl.textContent = ''; cyLbl.textContent = '';
    btnS.textContent = 'Start'; setSliders(true);
  }

  window.baReset = function() {
    running = false; cancelAnimationFrame(rafId);
    releaseWakeLock();
    phases = []; phaseIdx = 0; cycle = 0;
    goIdle();
    phLbl.textContent = '—'; tmLbl.textContent = ''; cyLbl.textContent = '';
    btnS.textContent = 'Start'; setSliders(true);
  };

  window.baToggleStart = function() {
    ensureAudio();
    if (!running && phases.length === 0) { start(); return; }
    if (!running) { resume(); return; }
    pause();
  };

  function setSliders(on) {
    Object.values(sl).forEach(s => s.disabled = !on);
  }

  goIdle();
})();
</script>
</div>
</body>
</html>
